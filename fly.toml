app = "nexus-defi-agent"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  WEB_PORT = "3000"
  NODE_ENV = "production"
  DATA_DIR = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "nexus_data"
  destination = "/data"
